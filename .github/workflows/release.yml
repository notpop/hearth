name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Build all targets
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          for target in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64 windows-amd64; do
            os="${target%-*}"
            arch="${target##*-}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"

            out="dist/hearth-${version}-${target}${ext}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/hearth

            if [ "$os" = "windows" ]; then
              (cd dist && zip "hearth-${version}-${target}.zip" "hearth-${version}-${target}${ext}")
            else
              tar -C dist -czf "dist/hearth-${version}-${target}.tar.gz" \
                "hearth-${version}-${target}${ext}"
            fi
            rm -f "$out"
          done
          (cd dist && sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt)
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
